services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shortlink
      POSTGRES_PASSWORD: shortlink
      POSTGRES_DB: shortlink
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortlink -d shortlink"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: hongockinh/shorten-share-links-backend:latest
    ports:
      - "8080:8080"
    environment:
      # Add ",oauth2" when using Google/GitHub login (set OAUTH2_* below).
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:docker,oauth2}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: shortlink
      DB_USER: shortlink
      DB_PASSWORD: shortlink
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: ${JWT_SECRET:-dJj7ZSdAsCknDJgaWQ2k2gr2ahJSVcQP}
      # Public URL for links in local dev (Vite frontend on :5173)
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:5173}
      # Where the backend redirects after OAuth (SPA should read ?token= from this URL)
      OAUTH2_REDIRECT_URI: ${OAUTH2_REDIRECT_URI:-http://localhost:5173/auth/callback}
      # Callback base URL registered in GitHub/Google OAuth app (backend on :8080)
      OAUTH2_AUTHORIZATION_CALLBACK_BASE_URL: ${OAUTH2_AUTHORIZATION_CALLBACK_BASE_URL:-http://localhost:8080}
      OAUTH2_GOOGLE_CLIENT_ID: ${OAUTH2_GOOGLE_CLIENT_ID:-}
      OAUTH2_GOOGLE_CLIENT_SECRET: ${OAUTH2_GOOGLE_CLIENT_SECRET:-}
      OAUTH2_GITHUB_CLIENT_ID: ${OAUTH2_GITHUB_CLIENT_ID:-}
      OAUTH2_GITHUB_CLIENT_SECRET: ${OAUTH2_GITHUB_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: hongockinh/shorten-share-links-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
