spring:
  application:
    name: shorten-share-links
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:shortlink}
    username: ${DB_USER:shortlink}
    password: ${DB_PASSWORD:shortlink}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        default_schema: public
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${OAUTH2_GITHUB_CLIENT_ID:-}
            client-secret: ${OAUTH2_GITHUB_CLIENT_SECRET:-}
            redirect-uri: ${OAUTH2_AUTHORIZATION_CALLBACK_BASE_URL}/login/oauth2/code/{registrationId}
            scope: read:user,user:email
        provider:
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true

app:
  public-base-url: ${PUBLIC_BASE_URL:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:dJj7ZSdAsCknDJgaWQ2k2gr2ahJSVcQP}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  redirect:
    path-prefix: /r
  rate-limit:
    requests-per-window: ${RATE_LIMIT_REQUESTS:120}
    window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}
  link-cache:
    ttl-seconds: ${LINK_CACHE_TTL_SECONDS:3600}
  guest-public:
    create-requests-per-window: ${GUEST_CREATE_RATE_LIMIT:5}
    create-window-seconds: ${GUEST_CREATE_RATE_WINDOW_SECONDS:10}
    link-ttl-days: ${GUEST_LINK_TTL_DAYS:30}
    cleanup-cron: "${CLEANUP_CRON:0 0 3 * * *}"
  turnstile:
    secret-key: ${TURNSTILE_SECRET_KEY:0x4AAAAAADDv6bmu4IyhuhtRe06AHAqac9M}
    verify-url: ${TURNSTILE_VERIFY_URL:https://challenges.cloudflare.com/turnstile/v0/siteverify}
  oauth2:
    # Same origin as the SPA (nginx :80 in Docker, or http://localhost:5173 in Vite dev)
    post-login-redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:5173/auth/callback}

logging:
  level:
    com.shortlink: INFO
    org.springframework.security: INFO

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:shortlink}
  data:
    redis:
      host: redis
