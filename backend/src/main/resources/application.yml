spring:
  application:
    name: shorten-share-links
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        default_schema: public
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      timeout: 2s
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${OAUTH2_GOOGLE_CLIENT_ID}
            client-secret: ${OAUTH2_GOOGLE_CLIENT_SECRET}
            redirect-uri: ${OAUTH2_AUTHORIZATION_CALLBACK_BASE_URL}/login/oauth2/code/{registrationId}
            scope: openid, profile, email
          github:
            client-id: ${OAUTH2_GITHUB_CLIENT_ID}
            client-secret: ${OAUTH2_GITHUB_CLIENT_SECRET}
            redirect-uri: ${OAUTH2_AUTHORIZATION_CALLBACK_BASE_URL}/login/oauth2/code/{registrationId}
            scope: read:user,user:email
        provider:
          google:
            issuer-uri: https://accounts.google.com
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true

app:
  public-base-url: ${PUBLIC_BASE_URL}
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS}
  redirect:
    path-prefix: /r
  rate-limit:
    requests-per-window: ${RATE_LIMIT_REQUESTS}
    window-seconds: ${RATE_LIMIT_WINDOW_SECONDS}
  link-cache:
    ttl-seconds: ${LINK_CACHE_TTL_SECONDS}
  guest-public:
    create-requests-per-window: ${GUEST_CREATE_RATE_LIMIT}
    create-window-seconds: ${GUEST_CREATE_RATE_WINDOW_SECONDS}
    link-ttl-days: ${GUEST_LINK_TTL_DAYS}
    cleanup-cron: ${CLEANUP_CRON}
  oauth2:
    # Same origin as the SPA (nginx :80 in Docker, or http://localhost:5173 in Vite dev)
    post-login-redirect-uri: ${OAUTH2_REDIRECT_URI}

logging:
  level:
    com.shortlink: INFO
    org.springframework.security: INFO

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/${DB_NAME}
  data:
    redis:
      host: redis
