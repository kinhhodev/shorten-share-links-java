spring:
  application:
    name: shorten-share-links
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:shortlink}
    username: ${DB_USER:shortlink}
    password: ${DB_PASSWORD:shortlink}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        default_schema: public
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true

app:
  public-base-url: ${PUBLIC_BASE_URL:http://localhost:8080}
  jwt:
    secret: ${JWT_SECRET:change-me-use-at-least-256-bits-in-production-please-change-this-secret-key-now}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  redirect:
    path-prefix: /l
  rate-limit:
    requests-per-window: ${RATE_LIMIT_REQUESTS:120}
    window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}
  link-cache:
    ttl-seconds: ${LINK_CACHE_TTL_SECONDS:3600}
  oauth2:
    post-login-redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:3000/auth/callback}

logging:
  level:
    com.shortlink: INFO
    org.springframework.security: INFO

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/${DB_NAME:shortlink}
  data:
    redis:
      host: redis
